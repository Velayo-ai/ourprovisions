<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}
  :root{--espresso:#2C1A0E;--espresso2:#1A0E06;--deep:#160B04;--cream:#FAF4EC;--sand:#C9A97A;--kraft:#A0724A;--teal:#0D9488;--amber:#D98E04;
    --bvi1:#E2F7F7;--bvi2:#A8E7E6;--bvi3:#5ECECD;--bvi4:#26A9B1;--bvi5:#117C8C;--ease:cubic-bezier(0.16,1,0.3,1);}
  body{background:#0a0a0a;font-family:'Lato',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
  .frame{position:relative;width:390px;height:844px;border-radius:30px;overflow:hidden;border:1px solid #2a2a2a;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
  .phone{position:absolute;inset:0;overflow:hidden;background:#000;}
  .controls{display:flex;gap:10px;align-items:center;} .btn{background:#1c1c1c;border:1px solid #333;color:#ddd;font-size:12px;letter-spacing:1px;padding:9px 18px;border-radius:20px;cursor:pointer;} .btn:hover{background:#262626;}
  .stage{font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;min-width:130px;text-align:center;}
  .app{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;}
  .header{position:relative;background:var(--espresso);overflow:hidden;padding-top:30px;flex:0 0 auto;}
  .header .depthglow{position:absolute;inset:0;z-index:0;opacity:0.6;background:radial-gradient(120% 90% at 50% 15%, rgba(94,206,205,0.12), transparent 55%),radial-gradient(100% 80% at 50% 130%, rgba(38,169,177,0.14), transparent 60%);}
  .titleband{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:12px 0 12px;}
  .app-title{font-family:'Playfair Display',serif;font-style:italic;font-size:32px;color:var(--cream);line-height:1;opacity:0;}
  .app-title .o{font-weight:400;} .app-title .p{font-weight:700;} .phone.settled .app-title{opacity:1;}
  .app-tabs{display:flex;gap:30px;margin-top:12px;} .app-tabs .tab{font-size:9px;letter-spacing:1.5px;color:rgba(201,169,122,0.6);} .app-tabs .tab.on{color:var(--cream);}
  .tabline{height:3px;background:var(--amber);width:33%;margin-left:33%;}
  .app-body{flex:1;background:var(--cream);padding:16px;display:flex;flex-direction:column;gap:9px;}
  .search{background:#F0E6D6;border-radius:12px;height:44px;display:flex;align-items:center;padding:0 14px;color:#b9a488;font-size:13px;}
  .row{background:#fff;border-radius:12px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(44,26,14,0.05);}
  .row .n{font-size:14px;color:var(--espresso);} .row .add{font-size:12px;color:var(--kraft);border:1px solid rgba(160,114,74,0.4);border-radius:16px;padding:5px 16px;}

  .scene{position:absolute;inset:0;z-index:3;background:var(--deep);overflow:hidden;}
  .depth{position:absolute;inset:0;background:radial-gradient(80% 55% at 50% 55%, #24140a 0%, #1A0E06 45%, #0d0602 100%);transform:scale(1.15);}
  .phone.crest .depth{animation:depthOpen 2.4s cubic-bezier(0.19,1,0.22,1) forwards;}
  @keyframes depthOpen{to{background:radial-gradient(140% 100% at 50% 44%, #4a2f18 0%, #2C1A0E 46%, #160B04 100%);transform:scale(1);}}
  .vignette{position:absolute;inset:0;z-index:1;pointer-events:none;box-shadow:inset 0 0 200px 90px rgba(0,0,0,0.9);}
  .phone.crest .vignette{animation:vigOpen 2.2s cubic-bezier(0.19,1,0.22,1) forwards;} @keyframes vigOpen{to{box-shadow:inset 0 0 260px 10px rgba(0,0,0,0.25);}}
  .bloom{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);z-index:2;width:10px;height:2px;border-radius:50%;opacity:0;background:radial-gradient(closest-side, rgba(168,231,230,0.9), rgba(38,169,177,0.3), transparent);}
  .phone.crest .bloom{animation:bloomWide 2.2s cubic-bezier(0.19,1,0.22,1) 0.1s forwards;}
  @keyframes bloomWide{0%{opacity:0;width:10px;}35%{opacity:1;width:420px;height:5px;filter:blur(3px);}100%{opacity:0.3;width:520px;height:2px;filter:blur(4px);}}
  .prompt{position:absolute;left:0;right:0;top:72%;text-align:center;z-index:6;font-weight:300;font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--sand);animation:breathe 3.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:0.22;}50%{opacity:0.7;}} .phone.crest .prompt{animation:fadeOut 0.4s ease forwards;}

  /* WATER SHEET — translucent BVI wash that floods up then drains away */
  .watersheet{position:absolute;inset:0;z-index:7;pointer-events:none;opacity:0;
    background:linear-gradient(180deg, rgba(226,247,247,0.0) 0%, rgba(168,231,230,0.55) 30%, rgba(94,206,205,0.65) 60%, rgba(38,169,177,0.55) 100%);
    transform:translateY(100%);}
  .phone.wash .watersheet{animation:flood 2.2s cubic-bezier(0.4,0,0.2,1) forwards;}
  @keyframes flood{
    0%{opacity:0;transform:translateY(100%);}
    35%{opacity:1;transform:translateY(0);}      /* wash floods over */
    65%{opacity:0.9;transform:translateY(0);}
    100%{opacity:0;transform:translateY(-100%);} /* recedes upward, revealing app */
  }
  #dust{position:absolute;inset:0;z-index:8;pointer-events:none;}
  .phone.wash .scene{animation:sceneFade 1.4s ease 0.3s forwards;} @keyframes sceneFade{to{opacity:0;}}
  .phone.wash .bloom{animation:fadeOut 0.4s ease forwards;}

  .lockup{position:absolute;left:0;right:0;top:0;z-index:9;display:flex;flex-direction:column;align-items:center;transform:translateY(var(--ly,300px));}
  .arch{width:124px;height:auto;opacity:0;overflow:visible;margin-bottom:32px;}
  .arch path{fill:none;stroke:var(--teal);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:150;stroke-dashoffset:150;}
  .phone.crest .arch{animation:archIn 1.5s ease 0.9s forwards;} @keyframes archIn{to{opacity:0.92;}}
  .phone.crest .arch path{animation:archDraw 1.4s cubic-bezier(0.22,1,0.36,1) 1.0s forwards;} @keyframes archDraw{to{stroke-dashoffset:0;}}
  .phone.wash .arch{animation:fadeOut 0.4s ease forwards;}
  .wm{position:relative;font-family:'Playfair Display',serif;font-style:italic;color:var(--cream);white-space:nowrap;font-size:40px;line-height:1;opacity:0;transform:translateY(54px) scale(0.94);filter:blur(12px);}
  .wm .o{font-weight:400;} .wm .p{font-weight:700;}
  .phone.crest .wm{animation:surface 1.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;}
  @keyframes surface{to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}}
  .phone.wash .lockup{animation:toHeader 1.6s cubic-bezier(0.5,0,0.15,1) forwards;} @keyframes toHeader{to{transform:translateY(48px);}}
  .phone.wash .wm{animation:wmShrink 1.6s cubic-bezier(0.5,0,0.15,1) forwards;}
  @keyframes wmShrink{to{font-size:32px;filter:blur(0);opacity:1;transform:translateY(0) scale(1);}}
  .phone.settled .lockup{opacity:0;}

  .s-tag{position:absolute;left:0;right:0;top:55%;text-align:center;font-weight:300;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--sand);opacity:0;z-index:6;}
  .phone.crest .s-tag{animation:fadeIn 1.2s ease 2.1s forwards;} .phone.wash .s-tag{animation:fadeOut 0.4s ease forwards;}
  .s-foot{position:absolute;left:0;right:0;bottom:36px;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;z-index:6;}
  .phone.crest .s-foot{animation:fadeIn 1.3s ease 2.5s forwards;} .phone.wash .s-foot{animation:fadeOut 0.4s ease forwards;}
  .s-foot img{width:26px;opacity:0.9;} .s-foot .vt{font-weight:400;font-size:10px;letter-spacing:4px;color:var(--sand);opacity:0.8;}
  @keyframes fadeIn{to{opacity:1;}} @keyframes fadeOut{to{opacity:0;}}
</style></head><body>

</div></div>
<div class="controls"><button class="btn" id="replay">▶ Replay</button><div class="stage" id="stage">threshold</div></div>
<script>
  const phone=document.getElementById('phone'),lockup=document.getElementById('lockup'),stage=document.getElementById('stage');
  const cv=document.getElementById('dust'),ctx=cv.getContext('2d');
  const DPR=Math.min(window.devicePixelRatio||1,2);
  function size(){const r=phone.getBoundingClientRect();cv.width=r.width*DPR;cv.height=r.height*DPR;cv.style.width=r.width+'px';cv.style.height=r.height+'px';}
  const W=()=>cv.width,H=()=>cv.height;
  let particles=[],raf=null;
  // BVI water band — foam, pale aqua, turquoise, teal. Weighted to bright turquoise.
  const COLORS=[[226,247,247],[168,231,230],[168,231,230],[94,206,205],[94,206,205],[38,169,177],[17,124,140]];
  function spawn(){particles=[];const cols=64,rows=120;
    for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){const x=(i+0.5)/cols*W(),y=(j+0.5)/rows*H();
      if(y<H()*0.09)continue; // preserve header band where name lands
      if(Math.random()>0.42)continue;const c=COLORS[(Math.random()*COLORS.length)|0];
      // water particles: gentle rise + more lateral drift (like caustics on water)
      particles.push({x,y,vx:(Math.random()-0.5)*0.6*DPR,vy:-(0.4+Math.random()*1.2)*DPR,life:0,ttl:70+Math.random()*50,r:(0.9+Math.random()*1.8)*DPR,c,delay:(y/H())*14});}}
  function dframe(){ctx.clearRect(0,0,W(),H());ctx.globalCompositeOperation='lighter';let alive=0;
    for(const p of particles){if(p.delay>0){p.delay--;alive++;continue;}p.life++;const t=p.life/p.ttl;if(t>=1)continue;alive++;
      p.x+=p.vx;p.y+=p.vy;p.vy*=0.99;p.vx+=(Math.random()-0.5)*0.08*DPR;const a=(1-t)*0.8;ctx.globalAlpha=a;
      const rr=p.r*(1-t*0.4)*2.4;const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr);
      g.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},1)`);g.addColorStop(1,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,rr,0,6.283);ctx.fill();}
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    if(alive>0)raf=requestAnimationFrame(dframe);else{phone.classList.add('settled');stage.textContent='surfaced · app';}}
  function play(){
    phone.classList.remove('crest','wash','settled');cancelAnimationFrame(raf);if(cv.width)ctx.clearRect(0,0,cv.width,cv.height);
    lockup.style.setProperty('--ly',(phone.getBoundingClientRect().height*0.28)+'px');stage.textContent='threshold';
    setTimeout(()=>{phone.classList.add('crest');stage.textContent='crest · reveal';},1400);
    setTimeout(()=>{stage.textContent='hold';},4600);
    setTimeout(()=>{size();spawn();phone.classList.add('wash');stage.textContent='BVI water wash';dframe();},5600);
  }
  document.getElementById('replay').addEventListener('click',play);
  requestAnimationFrame(()=>{size();play();});
  // --- minimal audio: wave breaks exactly on the wash dissolve ---
  (function(){
    const cue=document.getElementById('cue');
    // audio needs a gesture; prime silently on first pointerdown, then it can play.
    document.addEventListener('pointerdown',function p(){ cue.muted=true;
      cue.play().then(()=>{cue.pause();cue.currentTime=0;cue.muted=false;}).catch(()=>{cue.muted=false;});
    },{once:true,capture:true});
    function schedule(){ setTimeout(()=>{ try{cue.currentTime=0;cue.play();}catch(e){} }, 4500); }
    schedule();
    const rb=document.getElementById('replay');
    if(rb) rb.addEventListener('click',()=>{ try{cue.pause();cue.currentTime=0;}catch(e){} schedule(); });
  })();
</script>
